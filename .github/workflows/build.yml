{
  "name": "Build LegitHUD",
  "on": { "push": { "branches": ["main"] }, "workflow_dispatch": {} },
  "jobs": {
    "build": {
      "runs-on": "ubuntu-latest",
      "steps": [
        { "uses": "actions/checkout@v4" },
        { "run": "unzip -o legithud-source.zip -d extracted" },
        { "uses": "actions/setup-java@v4", "with": { "distribution": "temurin", "java-version": "21" } },
        { "uses": "gradle/actions/setup-gradle@v4", "with": { "gradle-version": "9.6.1" } },
        { "run": "cd extracted/legithud && gradle build --no-daemon" },
        { "uses": "actions/upload-artifact@v4", "with": { "name": "legithud-jar", "path": "extracted/legithud/build/libs/*.jar" } }
      ]
    }
  }
}
